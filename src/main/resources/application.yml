spring:
  application:
    name: seathub
  profiles:
    default: local
  data:
    redis:
      repositories:
        enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

seathub:
  jwt:
    secret: seathub-local-development-secret-key-for-hmac-sha256
    access-token-expiration-seconds: 3600
